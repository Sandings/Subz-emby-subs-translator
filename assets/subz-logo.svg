<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SubZ Logo Concept 5 Apple Style</title>
  <desc id="desc">Minimal badge style tuned toward Apple-like neutral palette and subtle cool accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F7F8"/>
      <stop offset="100%" stop-color="#ECEDEF"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2328"/>
      <stop offset="100%" stop-color="#0F1114"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <g transform="translate(160 210)">
    <rect x="0" y="0" width="420" height="360" rx="44" fill="url(#card)"/>
    <rect x="70" y="88" width="220" height="20" rx="10" fill="#D1D5DB"/>
    <rect x="70" y="134" width="270" height="20" rx="10" fill="#AAB2BD"/>
    <rect x="70" y="180" width="180" height="20" rx="10" fill="#8AA4BF"/>
    <path d="M290 64 H366 L306 152 H366 L294 296 H366" fill="none" stroke="#F5F5F7" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(650 320)">
    <text x="0" y="0" font-family="SF Pro Display, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="136" font-weight="700" fill="#111214">SubZ</text>
    <text x="4" y="72" font-family="SF Pro Text, Helvetica Neue, Helvetica, Arial, sans-serif" font-size="32" fill="#6E7681">Automatic Subtitle Translator</text>
  </g>
</svg>
