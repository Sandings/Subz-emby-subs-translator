<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SubZ Logo Concept 4</title>
  <desc id="desc">Global translation orbit style with modern blue and amber.</desc>
  <rect width="1200" height="800" fill="#F3F6FB"/>
  <g transform="translate(190 170)">
    <circle cx="220" cy="220" r="190" fill="#10213A"/>
    <ellipse cx="220" cy="220" rx="220" ry="86" fill="none" stroke="#4CB3FF" stroke-width="16"/>
    <ellipse cx="220" cy="220" rx="220" ry="86" fill="none" stroke="#FFB11F" stroke-width="16" transform="rotate(60 220 220)"/>
    <ellipse cx="220" cy="220" rx="220" ry="86" fill="none" stroke="#79D2FF" stroke-width="12" transform="rotate(120 220 220)"/>
    <text x="160" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="170" font-weight="900" fill="#FFFFFF">Z</text>
  </g>
  <g transform="translate(700 332)">
    <text x="0" y="0" font-family="Segoe UI, Arial, sans-serif" font-size="122" font-weight="800" fill="#10213A">SubZ</text>
    <text x="0" y="66" font-family="Segoe UI, Arial, sans-serif" font-size="34" fill="#55657D">Translate subtitles across languages</text>
  </g>
</svg>
